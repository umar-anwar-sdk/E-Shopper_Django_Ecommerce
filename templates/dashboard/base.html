<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}E-Shopper Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white shadow-sm">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <div>
          <a href="{% url 'home_page' %}" class="text-lg font-semibold text-slate-800">E-Shopper</a>
        </div>
        <nav class="space-x-4 text-sm text-slate-600">
          <a href="{% url 'home_page' %}" class="hover:text-slate-900">Store</a>
          <a href="{% url 'admin_dashboard' %}" class="hover:text-slate-900">Admin</a>
          <a href="{% url 'vendor_dashboard_page' %}" class="hover:text-slate-900">Vendor</a>
        </nav>
      </div>
    </header>

    <div class="flex-1 max-w-7xl mx-auto px-4 py-6">
      <div class="grid gap-6 lg:grid-cols-[260px_1fr]">
        <aside class="space-y-4 rounded-3xl bg-white p-6 shadow-sm">
          <div class="text-xs uppercase tracking-[0.16em] text-slate-500">Dashboard menu</div>
          <ul class="space-y-2">
            <li><a href="{% url 'admin_dashboard' %}" class="block rounded-xl px-4 py-2 hover:bg-slate-50">Admin overview</a></li>
            <li><a href="{% url 'vendor_dashboard_page' %}" class="block rounded-xl px-4 py-2 hover:bg-slate-50">Vendor overview</a></li>
            <li><a href="{% url 'home_page' %}" class="block rounded-xl px-4 py-2 hover:bg-slate-50">Shop home</a></li>
          </ul>
        </aside>

        <main class="space-y-6">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </div>
</body>
</html>
