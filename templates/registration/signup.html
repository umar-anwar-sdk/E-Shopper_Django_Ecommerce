{% extends 'base.html' %}
{% block content %}
<section id="form" style="margin-left: 30%"><!--form-->
		<div class="container">
			<div class="col-sm-4 col-sm-offset-1">
                <div class="signup-form"><!--login form-->
						<h2>New User Signup!</h2>
						<form method="POST">
							{% csrf_token %}
							{% for field in form %}
							{{ field.errors }}
							<p>{{ field }}</p>
							{% endfor %}
							<button class="btn btn-default" type="submit">Signup</button>
							<span style="margin-left: 100px;">Already have an account</span>&nbsp;<a href="{% url 'login' %}">Login</a>
                        </form>
				</div>
			</div>
		</div>
</section>

{% endblock %}
